name: Build PhoneFarm

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Build Game Stubs
      run: dotnet build stubs/GameStub.csproj -c Release -o ${{ github.workspace }}/lib

    - name: Download SMAPI
      run: |
        wget -q "https://github.com/Pathoschild/SMAPI/releases/download/4.1.8/SMAPI-4.1.8-installer.zip" -O /tmp/smapi.zip
        unzip -q /tmp/smapi.zip -d /tmp/smapi
        find /tmp/smapi -name "StardewModdingAPI.dll" -type f | head -1 | xargs -I{} cp {} ${{ github.workspace }}/lib/
        ls -la ${{ github.workspace }}/lib/

    - name: Build Mod
      run: dotnet build src/PhoneFarm.csproj -c Release -p:StubPath=${{ github.workspace }}/lib

    - name: Package
      run: |
        mkdir -p release/PhoneFarm
        find src/bin -name "PhoneFarm.dll" | head -1 | xargs -I{} cp {} release/PhoneFarm/
        cp src/manifest.json 
