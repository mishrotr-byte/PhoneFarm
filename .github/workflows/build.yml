name: Build PhoneFarm

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LIB_PATH: ${{ github.workspace }}/lib

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Build Game Stubs
      run: |
        dotnet build stubs/GameStub.csproj -c Release -o $LIB_PATH
        echo "=== Stub output ==="
        ls -la $LIB_PATH/

    - name: Download SMAPI DLL
      run: |
        wget -q "https://github.com/Pathoschild/SMAPI/releases/download/4.1.8/SMAPI-4.1.8-installer.zip" -O /tmp/smapi.zip
        unzip -q /tmp/smapi.zip -d /tmp/smapi
        find /tmp/smapi -name "StardewModdingAPI.dll" -type f | head -1 | xargs -I{} cp {} $LIB_PATH/
        echo "=== All libs ==="
        ls -la $LIB_PATH/

    - name: Build PhoneFarm
      run: |
        dotnet build src/PhoneFarm.csproj \
          -c Release \
          -p:StubPath=$LIB_PATH \
          -p:EnableModDeploy=false \
          -p:EnableGameDebugging=false

    - name: Package
      run: |
        mkdir -p release/PhoneFarm
        find src/bin -name "PhoneFarm.dll" | head -1 | xargs -I{} cp {} release/PhoneFarm/
        cp src/manifest.json release/PhoneFarm/
        cp src/config.json release/PhoneFarm/
        echo "=== Release contents ==="
        ls -la release/PhoneFarm/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneFarm-Mod
        path: release/PhoneFarm/
        retention-days: 90
